<!DOCTYPE html>
<html>
<head>
    <title>Iniciar Sesión - Universe Hub</title>
    <style>
        :root {
            --indigo-electric: #4f46e5;
            --white: #ffffff;
            --gray-light: #f3f4f6;
            --gray-slate: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, var(--gray-light) 0%, #e0e7ff 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            display: grid; grid-template-columns: 1fr 1fr; 
            width: 900px; height: 500px; background: var(--white); 
            border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .login-form { padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
        .hero { 
            background: linear-gradient(135deg, var(--indigo-electric), #7c3aed); 
            padding: 3rem; color: white; 
        }
        .logo { font-size: 2.2rem; font-weight: 800; margin-bottom: 1rem; }
        .tagline { font-size: 1.1rem; opacity: 0.95; line-height: 1.6; }
        input { 
            width: 100%; padding: 1rem; margin: 0.75rem 0; 
            border: 2px solid #e5e7eb; border-radius: 12px; 
            font-size: 1rem; transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--indigo-electric); }
        button { 
            width: 100%; padding: 1rem; background: var(--indigo-electric); 
            color: white; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: 600; cursor: pointer; 
            transition: background 0.2s;
        }
        button:hover { background: #3730a3; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: var(--indigo-electric); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-form">
            <h1 style="color: var(--gray-slate); margin-bottom: 2rem; font-size: 1.8rem;">Bienvenido de vuelta</h1>
            
            <form method="post">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Usuario" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
            
            <div class="links">
                <a href="{% url 'register' %}">¿No tienes cuenta? Regístrate</a>
            </div>
        </div>
        
        <div class="hero">
            <div class="logo">Universe Hub</div>
            <p class="tagline">
                Conecta con estudiantes universitarios.<br>
                Colabora en proyectos académicos.<br>
                Construye tu portafolio profesional.
            </p>
        </div>
    </div>
</body>
</html>
